# Save this output to a 'docker-compose.yaml' file and run 'docker compose up'.
#
# Created with ramalama-0.1.0-test
services:
  smallllama:
    container_name: ramalama-smallllama
    image: test-image/ramalama:latest
    volumes:
      - "/models/smallllama.gguf:/mnt/models/smallllama.gguf:ro"
      - "/models/tinyllama.gguf:/mnt/models/tinyllama.gguf:ro"
    ports:
      - "8080:8080"
    environment:
      - ACCEL_ENV=true
    devices:
      - "/dev/accel:/dev/accel"
      - "/dev/dri:/dev/dri"
      - "/dev/kfd:/dev/kfd"
    command: llama-server --model /mnt/models/smallllama.gguf
    restart: unless-stopped
