# Save the output of this file and use kubectl create -f to import
# it into Kubernetes.
#
# Created with ramalama-test-version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramalama
  labels:
    app: ramalama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ramalama
  template:
    metadata:
      labels:
        app: ramalama
    spec:
      containers:
      - name: ramalama
        image: testimage
        command: ["llama-server"]
        args: ['--model', '/mnt/models/model.file']
        env:
        - name: TEST_ENV
          value: "test_value"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - CAP_CHOWN
            - CAP_FOWNER
            - CAP_FSETID
            - CAP_KILL
            - CAP_NET_BIND_SERVICE
            - CAP_SETFCAP
            - CAP_SETGID
            - CAP_SETPCAP
            - CAP_SETUID
            - CAP_SYS_CHROOT
            add:
            - CAP_DAC_OVERRIDE
          seLinuxOptions:
            type: spc_t

        volumeMounts:
        - mountPath: /mnt/models/model.file
          name: model
        - mountPath: /mnt/models/model_draft.file
          name: model_draft
        - mountPath: /dev/accel
          name: accel
        - mountPath: /dev/dri
          name: dri
        - mountPath: /dev/kfd
          name: kfd
      volumes:
      - hostPath:
          path: /path/to/model.file
        name: model
      - hostPath:
          path: /path/to/model_draft.file
        name: model_draft
      - hostPath:
          path: /dev/accel
        name: accel
      - hostPath:
          path: /dev/dri
        name: dri
      - hostPath:
          path: /dev/kfd
        name: kfd
