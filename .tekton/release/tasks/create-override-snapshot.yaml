apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-override-snapshot
spec:
  description: >-
    Collect information about component builds and assemble them into an
    override snapshot for release.
  params:
  - name: commit-sha
    description: SHA of the commit that was pushed
  - name: tag
    description: Tag to include in the snapshot
    default: ""
  - name: skip
    description: A space-separated list of component names to exclude from the snapshot
    default: ""
  results:
  - name: TEST_OUTPUT
    description: Test result in json format
  steps:
  - name: create
    image: registry.access.redhat.com/ubi10/ubi:latest
    env:
    - name: COMMIT_SHA
      value: $(params.commit-sha)
    - name: EVENT_TYPE
      valueFrom:
        fieldRef:
          fieldPath: metadata.labels['pac.test.appstudio.openshift.io/event-type']
    - name: RELEASE_TAG
      value: $(params.tag)
    - name: SKIP_COMPONENTS
      value: $(params.skip)
    - name: RESULTS_TEST_OUTPUT_PATH
      value: $(results.TEST_OUTPUT.path)
    - name: NAMESPACE
      value: $(context.taskRun.namespace)
    script: |
      #!/usr/bin/env python3

      import json
      import os
      import subprocess
      import sys
      from dataclasses import dataclass, field
      from datetime import UTC
      from datetime import datetime as dt
      from pprint import pprint

      OC_VERSION = "4.19.8"
      OC_URL = (
          f"https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/{OC_VERSION}/openshift-client-linux-{OC_VERSION}.tar.gz"
      )
      OPC_VERSION = "1.19.0"
      OPC_URL = (
          f"https://github.com/openshift-pipelines/opc/releases/download/v{OPC_VERSION}/opc_{OPC_VERSION}_linux_x86_64.tar.gz"
      )
      OPC_SERVER = "https://tekton-results-tekton-results.apps.kflux-prd-rh03.nnv1.p1.openshiftapps.com"
      OPC_TOKEN = None


      def perror(*args, **kwargs):
          print(*args, file=sys.stderr, **kwargs)


      def install_util(url):
          curl_proc = subprocess.Popen(
              ["curl", "-fsSL", url],
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
          )
          tar_proc = subprocess.Popen(
              ["tar", "-xzv"],
              stdin=curl_proc.stdout,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
          )
          for proc in (tar_proc, curl_proc):
              out, err = proc.communicate(timeout=600)
              if proc.returncode:
                  if out:
                      perror(out.decode("utf-8"))
                  if err:
                      perror(err.decode("utf-8"))
                  raise RuntimeError(f"{proc.args[0]} exited with status {proc.returncode}")


      def run(cmd, input=None):
          proc = subprocess.run(
              cmd,
              input=input,
              capture_output=True,
              text=True,
          )
          if proc.stderr:
              perror(proc.stderr)
          proc.check_returncode()
          return proc.stdout


      def configure_opc_results():
          conf_dir = os.path.expanduser("~/.kube")
          os.makedirs(conf_dir)
          with open(os.path.join(conf_dir, "config"), "w") as kube_config:
              pass
          with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as token_file:
              global OPC_TOKEN
              OPC_TOKEN = token_file.read()
          # run(
          #     [
          #         "./opc",
          #         "results",
          #         "config",
          #         "set",
          #         "--host",
          #         f"https://tekton-results-tekton-results.apps.kflux-prd-rh03.nnv1.p1.openshiftapps.com",
          #         "--token",
          #         token,
          #     ]
          # )


      @dataclass
      class Component:
          name: str
          url: str
          dockerfileUrl: str


      @dataclass
      class PipelineRun:
          uid: str
          name: str = field(init=False)
          component: str = field(init=False)
          creation_time: dt = field(init=False)
          succeeded: bool = field(init=False)
          image_url: str = field(init=False)
          image_digest: str = field(init=False)

          @staticmethod
          def _get_result_value(name, items):
              for item in items:
                  if item["name"] == name:
                      return item["value"]

          def __post_init__(self):
              pr_json = run(
                  [
                      "./opc",
                      "results",
                      "pipelinerun",
                      "describe",
                      "--host",
                      OPC_SERVER,
                      "--api-path",
                      "",
                      "--namespace",
                      os.environ["NAMESPACE"],
                      "--token",
                      OPC_TOKEN,
                      "-o",
                      "json",
                      "--uid",
                      self.uid,
                  ]
              )
              pr = json.loads(pr_json)
              self.name = pr["metadata"]["name"]
              self.component = pr["metadata"]["labels"]["appstudio.openshift.io/component"]
              self.creation_time = dt.fromisoformat(pr["metadata"]["creationTimestamp"])
              last_cond = pr["status"]["conditions"][0]
              self.succeeded = last_cond["type"] == "Succeeded" and last_cond["status"] == "True"
              self.image_url = self._get_result_value("IMAGE_URL", pr["status"].get("results", []))
              self.image_digest = self._get_result_value("IMAGE_DIGEST", pr["status"].get("results", []))

          @property
          def digest_url(self):
              return f'{self.image_url.split(":")[0]}@{self.image_digest}'

          @property
          def valid(self):
              return bool(self.succeeded and self.image_url and self.image_digest)

          def is_newer_than(self, pr):
              return self.creation_time > pr.creation_time


      @dataclass
      class Snapshot:
          commit_sha: str
          event_type: str
          release_tag: str
          skip: list[str]
          namespace: str
          components: dict[str, Component] = field(init=False)
          prs: dict[str, PipelineRun] = field(init=False, default_factory=dict)

          def __post_init__(self):
              self.components = {c.name: c for c in self._get_components()}
              list(map(self.add_pr, (PipelineRun(uid) for uid in self.pr_uids)))

          def _get_components(self):
              output = run(
                  [
                      "./oc",
                      "get",
                      "-o",
                      'jsonpath={range .items[*]}'
                      '{.metadata.name} {.spec.source.git.url} {.spec.source.git.dockerfileUrl}{"\\n"}'
                      '{end}',
                      "component",
                  ]
              )
              for line in output.splitlines():
                  if not line:
                      continue
                  tokens = line.split()
                  if len(tokens) != 3:
                      raise ValueError(f"Invalid line in component output: {line}")
                  yield Component(*tokens)

          @property
          def pr_uids(self):
              output = run(
                  [
                      "./opc",
                      "results",
                      "pipelinerun",
                      "list",
                      "--host",
                      OPC_SERVER,
                      "--api-path",
                      "",
                      "--namespace",
                      os.environ["NAMESPACE"],
                      "--token",
                      OPC_TOKEN,
                      "--limit",
                      "1000",
                      "-L",
                      f"pipelinesascode.tekton.dev/sha={self.commit_sha}",
                  ]
              )
              for line in output.splitlines():
                  if not line:
                      continue
                  tokens = line.split()
                  if tokens[0] == "NAME":
                      # Skip header
                      continue
                  yield tokens[1]

          def add_pr(self, new_pr):
              if not new_pr.valid:
                  if not new_pr.succeeded:
                      perror(f"{new_pr.name} was not successful")
                  else:
                      perror(f"{new_pr.name} is missing results")
                  return
              if current_pr := self.prs.get(new_pr.component):
                  if current_pr.is_newer_than(new_pr):
                      perror(
                          f"{current_pr.name} (started {current_pr.creation_time}) is newer than "
                          f"{new_pr.name} (started {new_pr.creation_time}), ignoring"
                      )
                      return
                  perror(
                      f"Replacing {current_pr.name} (started {current_pr.creation_time}) with "
                      f"{new_pr.name} (started {new_pr.creation_time})"
                  )
              self.prs[new_pr.component] = new_pr

          @property
          def component_list(self):
              for name, comp in self.components.items():
                  if name in self.skip:
                      perror(f"Skipping {name}")
                      continue
                  pr = self.prs.get(name)
                  if not pr:
                      raise ValueError(f"No valid PipelineRun for {name}")
                  yield {
                      "containerImage": pr.digest_url,
                      "name": name,
                      "source": {
                          "git": {
                              "url": comp.url,
                              "dockerfileUrl": comp.dockerfileUrl,
                              "revision": self.commit_sha,
                          },
                      },
                  }

          def generate(self):
              repo_url = "https://github.com/containers/ramalama"
              snapshot = {
                  "apiVersion": "appstudio.redhat.com/v1alpha1",
                  "kind": "Snapshot",
                  "metadata": {
                      "namespace": "ramalama-tenant",
                      "generateName": "ramalama-release-",
                      "annotations": {
                          "build.appstudio.openshift.io/repo": f"{repo_url}?rev={self.commit_sha}",
                          "build.appstudio.redhat.com/commit_sha": self.commit_sha,
                          "build.appstudio.redhat.com/target_branch": "main",
                          "pac.test.appstudio.openshift.io/branch": "main",
                          "pac.test.appstudio.openshift.io/cancel-in-progress": "false",
                          "pac.test.appstudio.openshift.io/repo-url": repo_url,
                          "pac.test.appstudio.openshift.io/repository": "ramalama",
                          "pac.test.appstudio.openshift.io/sha": self.commit_sha,
                          "pac.test.appstudio.openshift.io/source-branch": "refs/heads/main",
                          "pac.test.appstudio.openshift.io/source-repo-url": repo_url,
                          "pac.test.appstudio.openshift.io/url-org": "containers",
                          "pac.test.appstudio.openshift.io/url-repository": "ramalama",
                          "test.appstudio.openshift.io/source-repo-url": repo_url,
                      },
                      "labels": {
                          "appstudio.openshift.io/application": "ramalama",
                          "pac.test.appstudio.openshift.io/sha": self.commit_sha,
                          "pac.test.appstudio.openshift.io/cancel-in-progress": "false",
                          "pac.test.appstudio.openshift.io/repository": "ramalama",
                          "pac.test.appstudio.openshift.io/url-org": "containers",
                          "pac.test.appstudio.openshift.io/url-repository": "ramalama",
                          "test.appstudio.openshift.io/type": "override",
                      },
                  },
                  "spec": {
                      "application": "ramalama",
                      "artifacts": {},
                      "components": list(self.component_list),
                  },
              }
              if self.event_type:
                  snapshot["metadata"]["labels"]["pac.test.appstudio.openshift.io/event-type"] = self.event_type
                  snapshot["metadata"]["annotations"]["pac.test.appstudio.openshift.io/event-type"] = self.event_type
              if self.release_tag:
                  snapshot["metadata"]["labels"]["test.appstudio.openshift.io/release-tag"] = self.release_tag
              return snapshot

          def create(self):
              output = run(["./oc", "create", "-f", "-"], input=json.dumps(self.generate()))
              print(output)

          @property
          def test_output(self):
              successes = len(list(self.component_list))
              output = {
                  "result": "SUCCESS",
                  "timestamp": dt.now(tz=UTC).isoformat(timespec="seconds"),
                  "note": f"Created override snapshot with {successes} components for commit {self.commit_sha}",
                  "namespace": self.namespace,
                  "successes": successes,
                  "failures": 0,
                  "warnings": 0,
              }
              if self.release_tag:
                  output["note"] += f" (tag {self.release_tag})"
              return output


      def main():
          install_util(OC_URL)
          install_util(OPC_URL)
          configure_opc_results()

          commit_sha = os.environ.get("COMMIT_SHA")
          if not commit_sha:
              raise ValueError("COMMIT_SHA environment variable must be defined")

          snapshot = Snapshot(
              commit_sha=commit_sha,
              event_type=os.environ.get("EVENT_TYPE"),
              release_tag=os.environ.get("RELEASE_TAG"),
              skip=os.environ.get("SKIP_COMPONENTS", "").split(),
              namespace=os.environ.get("NAMESPACE"),
          )

          if os.environ.get("DRY_RUN") in ["true", "yes", "1"]:
              pprint(snapshot.generate())
          else:
              snapshot.create()

          if test_output_path := os.environ.get("RESULTS_TEST_OUTPUT_PATH"):
              with open(test_output_path, "w") as outfd:
                  json.dump(snapshot.test_output, outfd)
              perror(f"Wrote test output to {test_output_path}")


      if __name__ == "__main__":
          main()
