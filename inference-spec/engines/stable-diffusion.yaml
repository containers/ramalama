schema_version: "1.0.0"
commands:
  - name: run
    inference_engine:
      name: "stable-diffusion"
      binary: "sd"
      options:
        - name: "--mode"
          description: "Run mode for the stable-diffusion binary"
          value: "img_gen"
        - name: "--model"
          description: "The AI model to use for image generation"
          value: "{{ model.model_path }}"
        - name: "--prompt"
          description: "Text prompt for image generation"
          value: "{{ args.prompt }}"
        - name: "--negative-prompt"
          description: "Negative prompt for image generation"
          value: "{{ args.negative_prompt }}"
          if: "{{ args.negative_prompt }}"
        - name: "--output"
          description: "Output file path for the generated image"
          value: "{{ args.output }}"
        - name: "--height"
          description: "Image height in pixel space"
          value: "{{ args.height }}"
          if: "{{ args.height }}"
        - name: "--width"
          description: "Image width in pixel space"
          value: "{{ args.width }}"
          if: "{{ args.width }}"
        - name: "--steps"
          description: "Number of sample steps"
          value: "{{ args.steps }}"
          if: "{{ args.steps }}"
        - name: "--cfg-scale"
          description: "Unconditional guidance scale"
          value: "{{ args.cfg_scale }}"
          if: "{{ args.cfg_scale }}"
        - name: "--seed"
          description: "RNG seed (-1 for random)"
          value: "{{ args.seed }}"
          if: "{{ args.seed is not none }}"
        - name: "--threads"
          description: "Number of threads to use during generation"
          value: "{{ args.threads }}"
        - name: "--sampling-method"
          description: "Sampling method (euler, euler_a, dpm++2m, lcm, etc.)"
          value: "{{ args.sampling_method }}"
          if: "{{ args.sampling_method }}"
        - name: "--batch-count"
          description: "Number of images to generate"
          value: "{{ args.batch_count }}"
          if: "{{ args.batch_count }}"
        - name: "-v"
          description: "Enable verbose logging"
          if: "{{ args.debug }}"
        # Pass arbitrary runtime arguments to sd
        - name: ""
          description: "Arbitrary runtime arguments for stable-diffusion"
          value: "{{ args.runtime_args }}"
