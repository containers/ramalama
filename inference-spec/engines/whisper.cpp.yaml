schema_version: "1.0.0"
commands:
  - name: serve
    inference_engine:
      name: "whisper-server"
      binary: "whisper-server"
      options:
        - name: "--host"
          description: "IP address for the AI model server to listen on"
          value: "{{ '0.0.0.0' if args.container else args.host }}"
        - name: "--port"
          description: "Port for the AI model server to listen on"
          value: "{{ args.port }}"
        - name: "--model"
          description: "Path to the whisper model file"
          value: "{{ model.model_path }}"
        - name: "--threads"
          description: "Number of threads to use during inference"
          value: "{{ args.threads }}"
        - name: "--debug-mode"
          description: "Enable debug logs"
          if: "{{ args.debug }}"
        - name: ""
          description: "Arbitrary runtime arguments for whisper-server"
          value: "{{ args.runtime_args }}"
  - name: transcribe
    inference_engine:
      name: "whisper-cli"
      binary: "whisper-cli"
      options:
        - name: "-m"
          description: "Path to the whisper model file"
          value: "{{ model.model_path }}"
        - name: "-f"
          description: "Path to the input audio file"
          value: "{{ args.input_file }}"
        - name: "-t"
          description: "Number of threads to use during inference"
          value: "{{ args.threads }}"
        - name: "--language"
          description: "Language of the audio (e.g. 'en', 'fr', 'auto')"
          value: "{{ args.language }}"
          if: "{{ args.language }}"
        - name: "--translate"
          description: "Translate audio output to English"
          if: "{{ args.translate }}"
        - name: ""
          description: "Arbitrary runtime arguments for whisper-cli"
          value: "{{ args.runtime_args }}"
