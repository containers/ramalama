name: Build and publish PyPI package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  # Create and verify release artifacts
  # - build source dist (tarball) and wheel
  # - upload artifacts to GHA
  build-package:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout containers/ramalama
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build and inspect python package
        uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18
        with:
          attest-build-provenance-github: |
            ${{ github.repository_owner == 'containers' && (
                  github.event.action == 'published' ||
                  ( github.event_name == 'push' && github.ref == 'refs/heads/main' )
                ) && 'true' || 'false'
            }}

  # push to Test PyPI on
  # - a new GitHub release is published
  # - a PR is merged into main branch
  publish-test-pypi:
    name: Publish packages to test.pypi.org
    if: |
      github.repository_owner == 'containers' && (
        github.event.action == 'published' ||
        ( github.event_name == 'push' && github.ref == 'refs/heads/main' )
      )
    permissions:
      # see https://docs.pypi.org/trusted-publishers/
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ramalama
    needs: build-package
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Fetch build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist

      - name: Upload to Test PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

  # push to Production PyPI on
  # - a new GitHub release is published
  publish-pypi:
    name: Publish release to pypi.org
    if: github.repository_owner == 'containers' && github.event.action == 'published'
    permissions:
      # see https://docs.pypi.org/trusted-publishers/
      id-token: write
      # allow gh release upload
      contents: write
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ramalama
    needs: build-package
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Fetch build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist

      - name: Upload artifacts to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload '${{ github.ref_name }}' dist/* --repo '${{ github.repository }}'

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
